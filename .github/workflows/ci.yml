name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  extension:
    name: Extension smoke and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Secret scan
        run: node tools/secret_scan.js

      - name: Syntax check
        run: |
          node --check extension/background.js
          node --check extension/provider_registry.js
          node --check extension/popup.js
          node --check extension/i18n.js
          node --check extension/diagnostics.js
          node --check extension/page_quick_rail.js
          node --check extension/sidepanel.js
          node --check extension/dashboard.js
          node --check tools/extension_smoke_test.js
          node --check tools/package_extension.js
          node --check tools/chrome_runtime_smoke_test.js
          node --check tools/open_manual_qa_profile.js
          node --check tools/qa_seed_tabs.js
          node --check tools/generate_extension_assets.js
          node --check tools/capture_ui_screenshots.js
          node --check tools/capture_real_ai_sidepanel_result.js
          node --check tools/build_store_screenshots.js
          node --check tools/prepare_store_asset_review_packet.js
          node --check tools/deepseek_real_tabs_classification.js
          node --check tools/deepseek_smoke_test.js
          node --check tools/write_private_beta_ai_config.js
          node --check tools/secret_scan.js
          node --check tools/public_repo_audit.js
          node --check tools/launch_readiness_report.js
          node --check tools/check_remote_ci_status.js
          node --check tools/final_launch_gate_check.js
          node --check tools/prepare_public_launch_handoff_packet.js
          node --check tools/real_profile_qa_redaction_check.js
          node --check tools/prepare_real_profile_qa_packet.js
          node --check tools/provider_registry_check.js
          node --check tools/issue_form_smoke_test.js
          node --check tools/verify_release_package.js
          node --check tools/beta_readiness_check.js
          node --check tools/preflight.js

      - name: Extension smoke test
        run: node tools/extension_smoke_test.js

      - name: Provider registry check
        run: node tools/provider_registry_check.js

      - name: Issue form smoke test
        run: node tools/issue_form_smoke_test.js

      - name: Launch and QA packet self-tests
        run: |
          node tools/launch_readiness_report.js --json
          node tools/check_remote_ci_status.js --self-test
          node tools/final_launch_gate_check.js --self-test
          node tools/real_profile_qa_redaction_check.js --self-test
          node tools/prepare_real_profile_qa_packet.js --self-test
          node tools/prepare_store_asset_review_packet.js --self-test
          node tools/prepare_public_launch_handoff_packet.js --self-test

      - name: Public repo audit
        run: node tools/public_repo_audit.js

      - name: Package extension
        run: node tools/package_extension.js

      - name: Verify release package
        run: node tools/verify_release_package.js

      - name: Beta readiness check
        run: node tools/beta_readiness_check.js

      - name: Upload extension package artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabmosaic-ai-extension
          path: |
            dist/tabmosaic-ai-extension-v*.zip
            dist/tabmosaic-ai-extension-v*.sha256
            dist/tabmosaic-ai-extension-v*.package.json
